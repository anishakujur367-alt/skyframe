<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyFrame</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="sky-header">
    <h1 class="sky-title">SkyFrame</h1>
    <p class="sky-subtitle">Explore the universe through daily cosmic visuals</p>
  </header>

  <p id="loading">Loading...</p>

  <!-- 📅 Date -->
  <input type="date" id="datePicker">

  <!-- 🔍 Search -->
  <input type="text" id="search" placeholder="Search by title..." />


  <!-- 📊 Sort -->
  <select id="sortDropdown">
    <option value="" disabled selected>Sort by...</option>
    <option value="az">Sort A-Z</option>
    <option value="za">Sort Z-A</option>
  </select>

  <!-- 🌙 Theme -->
  <button id="toggleTheme">☀️</button>

  <!-- Modal Overlay Backdrop -->
  <div id="backdrop" class="modal-backdrop"></div>

  <!-- 📦 Data -->
  <div id="container"></div>

  <!-- 🔙 Back Button -->
  <button id="backBtn"
    style="display: none; background-color: #ff4757; color: white; border: none; padding: 12px 28px; border-radius: 50px; cursor: pointer; margin: 20px auto; font-size: 1rem; font-weight: 600;">⬅
    Back to All Dates</button>

  <!-- 🔽 Load More -->
  <button id="loadMore">Load More</button>

  <script src="script.js"></script>
</body>

</html>
